<script type="text/babel">
const{useState,useEffect,useCallback}=React;
const SB="https://kkxfyuzqokxikwpnmnlr.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreGZ5dXpxb2t4aWt3cG5tbmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjkyMjIsImV4cCI6MjA5MDA0NTIyMn0.CM4t5cfqOoFJJWRIBh2zNrudC0dTAxRwxRSy5D6TDL0";
const G=async p=>{try{const r=await fetch(SB+"/rest/v1/"+p,{headers:{apikey:SK,Authorization:"Bearer "+SK}});const t=await r.text();return t?JSON.parse(t):[];}catch(e){return[];}};
const SL=new URLSearchParams(window.location.search).get("venue")||"cafe-el-artesano";

function App(){
  const[lang,setLang]=useState(()=>{const p=new URLSearchParams(window.location.search).get("lang");if(p)return p==="en"?"en":"es";return(navigator.language||"es").toLowerCase().startsWith("es")?"es":"en";});
  const[v,setV]=useState(null);
  const[cats,setCats]=useState([]);
  const[items,setItems]=useState([]);
  const[activeCat,setActiveCat]=useState("all");
  const[loading,setLoading]=useState(true);
  const[scrolled,setScrolled]=useState(false);
  const[mob,setMob]=useState(false);
  const t=useCallback((es,en)=>lang==="es"?(es||en||""):(en||es||""),[lang]);

  useEffect(()=>{(async()=>{
    const d=await G("venues?slug=eq."+SL+"&limit=1");
    if(d?.length){const ve=d[0];setV(ve);const id=ve.id;
      const[c,m]=await Promise.all([G("menu_categories?venue_id=eq."+id+"&order=sort_order.asc"),G("menu_items?venue_id=eq."+id+"&is_available=eq.true&order=sort_order.asc")]);
      setCats(c||[]);setItems(m||[]);
    }setLoading(false);
  })();},[]);

  useEffect(()=>{document.documentElement.lang=lang;if(v)document.title=lang==="es"?"Carta y Precios — "+v.name+" | Barajas, Madrid":"Menu & Prices — "+v.name+" | Barajas, Madrid";},[lang,v]);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>50);window.addEventListener("scroll",fn);return()=>window.removeEventListener("scroll",fn);},[]);

  if(loading)return<div style={{minHeight:"100vh",background:"#1A1A1A",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><div style={{width:40,height:40,border:"3px solid rgba(245,200,122,.2)",borderTopColor:"#F5C87A",borderRadius:"50%",animation:"spin .8s linear infinite"}}/></div>;
  if(!v)return<div style={{minHeight:"100vh",background:"#1A1A1A",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#F5C87A"}}>Not found</span></div>;

  const filtered=activeCat==="all"?items:items.filter(i=>i.category_id===activeCat);

  // Group items by category for "all" view
  const grouped=[];
  if(activeCat==="all"){
    cats.forEach(c=>{const ci=items.filter(i=>i.category_id===c.id);if(ci.length)grouped.push({cat:c,items:ci});});
    const uncategorized=items.filter(i=>!cats.find(c=>c.id===i.category_id));
    if(uncategorized.length)grouped.push({cat:{name_es:"Otros",name_en:"Other",icon:""},items:uncategorized});
  }

  return(
  <div>
    {/* NAV */}
    <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all .4s",background:scrolled?"rgba(26,26,26,.92)":"rgba(26,26,26,1)",backdropFilter:scrolled?"blur(12px)":"none",borderBottom:"1px solid rgba(245,200,122,.1)"}}>
      <a href="index.html" style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.4rem",color:"#F5C87A",textDecoration:"none"}}>{v.name}</a>
      <div style={{display:"flex",gap:"1.5rem",alignItems:"center"}} className="nd">
        {[["index.html",t("Inicio","Home")],["carta.html",t("Carta","Menu")],["ubicacion.html",t("Ubicación","Location")]].map(([h,l])=><a key={h} href={h} style={{color:"#FCECD2",textDecoration:"none",fontSize:".85rem",letterSpacing:".08em",textTransform:"uppercase",opacity:h==="carta.html"?1:.7,fontWeight:h==="carta.html"?600:400}}>{l}</a>)}
        <button onClick={()=>setLang(l=>l==="es"?"en":"es")} style={{background:"rgba(245,200,122,.15)",border:"1px solid rgba(245,200,122,.3)",color:"#F5C87A",padding:"6px 12px",borderRadius:4,fontFamily:"inherit",fontSize:".8rem",cursor:"pointer"}}>{lang==="es"?"EN":"ES"}</button>
      </div>
      <button onClick={()=>setMob(true)} className="nm" style={{background:"none",border:"none",color:"#F5C87A",fontSize:"1.4rem",cursor:"pointer"}}>☰</button>
    </nav>
    {mob&&<div style={{position:"fixed",inset:0,background:"rgba(26,26,26,.97)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}} onClick={()=>setMob(false)}>
      <button style={{position:"absolute",top:16,right:20,background:"none",border:"none",color:"#F5C87A",fontSize:"1.8rem",cursor:"pointer"}}>✕</button>
      {[["index.html",t("Inicio","Home")],["carta.html",t("Carta","Menu")],["ubicacion.html",t("Ubicación","Location")]].map(([h,l])=><a key={h} href={h} style={{color:"#FCECD2",textDecoration:"none",fontFamily:"'DM Serif Display',serif",fontSize:"1.5rem"}}>{l}</a>)}
      <button onClick={()=>{setLang(l=>l==="es"?"en":"es");setMob(false);}} style={{background:"rgba(245,200,122,.15)",border:"1px solid rgba(245,200,122,.3)",color:"#F5C87A",padding:"8px 16px",borderRadius:4,fontFamily:"inherit",cursor:"pointer"}}>{lang==="es"?"EN":"ES"}</button>
    </div>}
    <style>{`.nm{display:none!important}@media(max-width:768px){.nd{display:none!important}.nm{display:block!important}}`}</style>

    {/* PAGE HEADER */}
    <div style={{background:"#1A1A1A",padding:"100px 24px 48px",textAlign:"center",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 60% 50% at 50% 50%,rgba(158,74,58,.12),transparent)"}}/>
      <div style={{position:"relative",zIndex:1}}>
        <nav aria-label="Breadcrumb" style={{marginBottom:16}}>
          <a href="index.html" style={{color:"rgba(252,236,210,.5)",textDecoration:"none",fontSize:13}}>{t("Inicio","Home")}</a>
          <span style={{color:"rgba(252,236,210,.3)",margin:"0 8px"}}>/</span>
          <span style={{color:"#F5C87A",fontSize:13}}>{t("Carta","Menu")}</span>
        </nav>
        <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(2.2rem,5vw,3.5rem)",color:"#FCECD2",marginBottom:12}}>
          {t("Carta de Café El Artesano","Café El Artesano Menu")}
        </h1>
        <p style={{color:"rgba(252,236,210,.6)",fontSize:15,fontWeight:300}}>
          {t(items.length+" productos · Precios actualizados · Barajas, Madrid",items.length+" items · Updated prices · Barajas, Madrid")}
        </p>
      </div>
    </div>

    {/* TABS */}
    <div style={{background:"#FFFDF9",position:"sticky",top:56,zIndex:50,borderBottom:"1px solid rgba(44,36,32,.08)",padding:"12px 24px"}}>
      <div style={{maxWidth:1000,margin:"0 auto",display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap"}}>
        <button onClick={()=>setActiveCat("all")} style={{padding:"7px 16px",border:"1px solid",borderRadius:40,fontFamily:"inherit",fontSize:13,cursor:"pointer",borderColor:activeCat==="all"?"#9E4A3A":"rgba(44,36,32,.15)",background:activeCat==="all"?"#9E4A3A":"transparent",color:activeCat==="all"?"#FCECD2":"#6B5E56"}}>{t("Todos","All")}</button>
        {cats.map(c=>(
          <button key={c.id} onClick={()=>setActiveCat(c.id)} style={{padding:"7px 16px",border:"1px solid",borderRadius:40,fontFamily:"inherit",fontSize:13,cursor:"pointer",borderColor:activeCat===c.id?"#9E4A3A":"rgba(44,36,32,.15)",background:activeCat===c.id?"#9E4A3A":"transparent",color:activeCat===c.id?"#FCECD2":"#6B5E56"}}>{c.icon?c.icon+" ":""}{t(c.name_es,c.name_en)}</button>
        ))}
      </div>
    </div>

    {/* MENU CONTENT */}
    <main style={{padding:"32px 24px 80px",background:"#FFFDF9",minHeight:"60vh"}}>
      <div style={{maxWidth:1000,margin:"0 auto"}}>
        {activeCat==="all"?
          grouped.map(({cat:c,items:ci},gi)=>(
            <div key={gi} style={{marginBottom:40}}>
              <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.5rem",color:"#1A1A1A",marginBottom:16,paddingBottom:8,borderBottom:"2px solid rgba(158,74,58,.15)"}}>
                {c.icon?c.icon+" ":""}{t(c.name_es,c.name_en)}
              </h2>
              <div className="mg" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:4}}>
                {ci.map(it=>(
                  <article key={it.id} style={{display:"flex",alignItems:"baseline",padding:"10px 12px",borderRadius:8}}>
                    <span style={{fontSize:14,color:"#2C2420",paddingRight:8}}>{t(it.name_es,it.name_en)}</span>
                    <span style={{flex:1,borderBottom:"1px dotted rgba(44,36,32,.15)",margin:"0 6px",minWidth:16,alignSelf:"center",position:"relative",top:-2}} aria-hidden="true"/>
                    <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1rem",color:"#9E4A3A",whiteSpace:"nowrap"}}>{Number(it.price).toFixed(2).replace(".",",")} €</span>
                  </article>
                ))}
              </div>
            </div>
          ))
        :
          <div className="mg" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:4}}>
            {filtered.map(it=>(
              <article key={it.id} style={{display:"flex",alignItems:"baseline",padding:"10px 12px",borderRadius:8}}>
                <span style={{fontSize:14,color:"#2C2420",paddingRight:8}}>{t(it.name_es,it.name_en)}</span>
                <span style={{flex:1,borderBottom:"1px dotted rgba(44,36,32,.15)",margin:"0 6px",minWidth:16,alignSelf:"center",position:"relative",top:-2}} aria-hidden="true"/>
                <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1rem",color:"#9E4A3A",whiteSpace:"nowrap"}}>{Number(it.price).toFixed(2).replace(".",",")} €</span>
              </article>
            ))}
          </div>
        }
        <p style={{textAlign:"center",marginTop:32,color:"#6B5E56",fontSize:13,fontStyle:"italic"}}>{t("* Suplemento para llevar: 0,10€. IVA incluido.","* Takeaway surcharge: €0.10. VAT included.")}</p>
      </div>
    </main>

    {/* FOOTER */}
    <footer style={{padding:"40px 24px",background:"#111",textAlign:"center",color:"rgba(252,236,210,.4)",fontSize:13}}>
      <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",color:"#F5C87A",marginBottom:6}}>{v.name}</div>
      <nav style={{marginTop:8,display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
        <a href="index.html" style={{color:"rgba(252,236,210,.5)",textDecoration:"none",fontSize:12}}>{t("Inicio","Home")}</a>
        <a href="ubicacion.html" style={{color:"rgba(252,236,210,.5)",textDecoration:"none",fontSize:12}}>{t("Ubicación","Location")}</a>
      </nav>
      <p style={{marginTop:10}}>© 2026 {v.name}</p>
    </footer>
    <style>{`@media(max-width:768px){.mg{grid-template-columns:1fr!important}}`}</style>
  </div>);
}

</script>
