        <div className="ag" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:48,alignItems:"center"}}>
          <div style={{position:"relative",height:400,borderRadius:12,overflow:"hidden",background:"#1A1A1A"}} aria-hidden="true">
            <div style={{position:"absolute",inset:0,background:"radial-gradient(circle at 30% 70%,rgba(158,74,58,.5),transparent 60%),radial-gradient(circle at 70% 30%,rgba(245,200,122,.3),transparent 50%),linear-gradient(135deg,#2C2420,#1A1A1A)",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:24}}>
              <div style={{width:60,height:80,background:"radial-gradient(ellipse,rgba(245,200,122,.9),rgba(245,200,122,.2) 60%,transparent 80%)",borderRadius:"50% 50% 40% 40%",animation:"glow 3s ease-in-out infinite"}}/>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:3,width:200,opacity:.5}}>{Array.from({length:10}).map((_,i)=><div key={i} style={{height:12,background:"#9E4A3A",borderRadius:1,opacity:i%3===0?.5:i%2===0?.7:1}}/>)}</div>
            </div>
          </div>
          <div>
            <span style={{fontSize:11,letterSpacing:".15em",textTransform:"uppercase",color:"#9E4A3A",fontWeight:600,marginBottom:12,display:"block"}}>{t("Nuestro espacio","Our space")}</span>
            <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(2rem,4vw,2.8rem)",color:"#1A1A1A",lineHeight:1.15,marginBottom:20}}>{t("El bar de barrio que se ha puesto al día","The neighborhood bar, refreshed")}</h2>
            <p style={{color:"#6B5E56",lineHeight:1.8,fontSize:".95rem",fontWeight:300}}>{t(v.description_es,v.description_en)}</p>
            <div className="fg" style={{display:"flex",gap:28,marginTop:24}}>
              {[[items.length+"+",t("Productos","Products")],[hrs.length?hrs[0].open_time?.slice(0,5):"7:00",t("Abrimos","We open")],[minP.toFixed(2)+"€",t("Desde","From")]].map(([n,l],i)=>(
                <div key={i} style={{display:"flex",flexDirection:"column",gap:4}}>
                  <strong style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.8rem",color:"#9E4A3A"}}>{n}</strong>
                  <span style={{fontSize:11,color:"#6B5E56",letterSpacing:".05em",textTransform:"uppercase"}}>{l}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* SPECIALS */}
    {sp&&<section style={{background:"linear-gradient(135deg,#9E4A3A,#C4705F)",padding:"48px 24px",textAlign:"center",color:"#FCECD2",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(255,255,255,.03) 10px,rgba(255,255,255,.03) 20px)"}}/>
      <div style={{position:"relative",zIndex:1}}>
        <span style={{fontSize:11,letterSpacing:".15em",textTransform:"uppercase",opacity:.7,display:"block",marginBottom:12}}>{t("Lo más pedido","Most popular")}</span>
        <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(1.4rem,3vw,2rem)",marginBottom:8}}>{t(sp.title_es,sp.title_en)}</h2>
        {(sp.description_es||sp.description_en)&&<p style={{fontSize:".95rem",fontWeight:300,opacity:.9}}>{t(sp.description_es,sp.description_en)}</p>}
        {sp.price&&<p style={{fontFamily:"'DM Serif Display',serif",fontSize:"2.5rem",marginTop:8,color:"#F5C87A"}}>{Number(sp.price).toFixed(2).replace(".",",")}€</p>}
      </div>
    </section>}

    {/* MINI MENU PREVIEW */}
    <section style={{padding:"64px 24px",background:"#FFFDF9",position:"relative"}}>
      <div style={{position:"absolute",inset:0,pointerEvents:"none",background:"repeating-linear-gradient(90deg,transparent,transparent 100px,rgba(158,74,58,.02) 100px,rgba(158,74,58,.02) 101px)"}}/>
      <div style={{maxWidth:700,margin:"0 auto",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:30}}>
          <span style={{fontSize:11,letterSpacing:".15em",textTransform:"uppercase",color:"#9E4A3A",fontWeight:600,display:"block",marginBottom:12}}>{t("Nuestra carta","Our menu")}</span>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(1.8rem,3vw,2.4rem)",color:"#1A1A1A",marginBottom:8}}>{t("Destacados de la carta","Menu highlights")}</h2>
          <p style={{color:"#6B5E56",fontWeight:300,fontSize:".95rem"}}>{t("Más de "+items.length+" productos — aquí van algunos de los favoritos","Over "+items.length+" items — here are some favorites")}</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {featured.map(it=>(
            <div key={it.id} style={{display:"flex",alignItems:"baseline",padding:"10px 12px",borderRadius:8}}>
              <span style={{fontSize:15,color:"#2C2420",paddingRight:8}}>{t(it.name_es,it.name_en)}</span>
              <span style={{flex:1,borderBottom:"1px dotted rgba(44,36,32,.15)",margin:"0 8px",minWidth:20,alignSelf:"center",position:"relative",top:-2}} aria-hidden="true"/>
              <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.05rem",color:"#9E4A3A",whiteSpace:"nowrap"}}>{Number(it.price).toFixed(2).replace(".",",")} €</span>
            </div>
          ))}
        </div>
        <div style={{textAlign:"center",marginTop:28}}>
          <a href="carta.html" style={{display:"inline-flex",alignItems:"center",gap:8,background:"#9E4A3A",color:"#FCECD2",padding:"14px 32px",borderRadius:6,textDecoration:"none",fontWeight:500,fontSize:".95rem",border:"1px solid rgba(196,112,95,.4)",transition:"all .3s"}}>
            {t("Ver carta completa →","View full menu →")}
          </a>
        </div>
      </div>
    </section>

    {/* FAQ */}
    <section id="faq" style={{padding:"64px 24px",background:"#FAF5EE"}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:30}}>
          <span style={{fontSize:11,letterSpacing:".15em",textTransform:"uppercase",color:"#9E4A3A",fontWeight:600,display:"block",marginBottom:12}}>FAQ</span>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(1.8rem,3vw,2.4rem)",color:"#1A1A1A"}}>{t("Preguntas frecuentes","Frequently Asked Questions")}</h2>
        </div>
        {faqs.map((f,i)=>(
          <div key={i} style={{marginBottom:8,background:"#fff",borderRadius:10,border:"1px solid #eee",overflow:"hidden"}}>
            <button onClick={()=>setOpenFaq(openFaq===i?null:i)} aria-expanded={openFaq===i} style={{width:"100%",textAlign:"left",padding:"16px 20px",border:"none",background:"transparent",cursor:"pointer",fontSize:15,fontWeight:600,color:"#2C2420",fontFamily:"inherit",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              {f.q}<span style={{fontSize:20,color:"#9E4A3A",transform:openFaq===i?"rotate(45deg)":"none",transition:"transform .2s"}}>+</span>
            </button>
            {openFaq===i&&<div style={{padding:"0 20px 16px",color:"#6B5E56",lineHeight:1.7,fontSize:14}}>{f.a}</div>}
          </div>
        ))}
      </div>
    </section>

    {/* MINI LOCATION CTA */}
    <section style={{padding:"64px 24px",background:"#1A1A1A",textAlign:"center",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 60% 40% at 50% 50%,rgba(158,74,58,.15),transparent)"}}/>
      <div style={{position:"relative",zIndex:1}}>
        <span style={{fontSize:11,letterSpacing:".15em",textTransform:"uppercase",color:"#F5C87A",fontWeight:600,opacity:.7,display:"block",marginBottom:12}}>{t("Encuéntranos","Find us")}</span>
        <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(1.8rem,3vw,2.4rem)",color:"#FCECD2",marginBottom:12}}>{t("Ven a vernos a Barajas","Come visit us in Barajas")}</h2>
        <p style={{color:"rgba(252,236,210,.6)",fontSize:15,marginBottom:8}}>Avenida de Logroño, Barajas, Madrid</p>
        <p style={{color:"rgba(252,236,210,.5)",fontSize:14,marginBottom:24}}>{t("Lunes a Domingo · 7:00 — 20:00","Monday to Sunday · 7:00 AM — 8:00 PM")}</p>
        <a href="ubicacion.html" style={{display:"inline-flex",alignItems:"center",gap:8,background:"#9E4A3A",color:"#FCECD2",padding:"14px 32px",borderRadius:6,textDecoration:"none",fontWeight:500,fontSize:".95rem",border:"1px solid rgba(196,112,95,.4)"}}>
          📍 {t("Ver ubicación y horarios","View location & hours")}
        </a>
      </div>
    </section>
    </main>

    {/* FOOTER */}
    <footer style={{padding:"40px 24px",background:"#111",textAlign:"center",color:"rgba(252,236,210,.4)",fontSize:13}}>
      <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",color:"#F5C87A",marginBottom:6}}>{v.name}</div>
      <p>{t("Cafetería y desayunos en Barajas, Madrid","Café and breakfast in Barajas, Madrid")}</p>
      <nav style={{marginTop:12,display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
        <a href="index.html" style={{color:"rgba(252,236,210,.5)",textDecoration:"none",fontSize:12}}>{t("Inicio","Home")}</a>
        <a href="carta.html" style={{color:"rgba(252,236,210,.5)",textDecoration:"none",fontSize:12}}>{t("Carta completa","Full menu")}</a>
        <a href="ubicacion.html" style={{color:"rgba(252,236,210,.5)",textDecoration:"none",fontSize:12}}>{t("Ubicación","Location")}</a>
      </nav>
      <p style={{marginTop:10}}>© 2026 {v.name}</p>
    </footer>

    <style>{`@media(max-width:768px){.ag{grid-template-columns:1fr!important;gap:24px!important}.ag>div:first-child{height:250px!important}.fg{flex-wrap:wrap;gap:16px!important}}`}</style>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
